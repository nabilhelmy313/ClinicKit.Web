<header
  class="ck-topbar"
  [class.topbar--dark]="isDark()"
  [class.topbar--sticky]="isSticky"
>
  <div class="topbar__inner">

    <!-- ─── Left: hamburger + breadcrumb ─── -->
    <div class="topbar__left">
      <button class="topbar__burger" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i class="ri-menu-line"></i>
      </button>

      <div class="topbar__search">
        <i class="ri-search-line topbar__search-icon"></i>
        <input
          type="text"
          class="topbar__search-input"
          placeholder="Search patients, appointments…"
          aria-label="Global search"
        />
      </div>
    </div>

    <!-- ─── Right: action icons ─── -->
    <ul class="topbar__actions">

      <!-- Dark mode toggle -->
      <li>
        <button
          class="topbar__icon-btn"
          (click)="toggleTheme()"
          [matTooltip]="isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          <i [class]="isDark() ? 'ri-sun-line' : 'ri-moon-line'"></i>
        </button>
      </li>

      <!-- Appointments quick-link -->
      <li>
        <a
          routerLink="/appointments/calendar"
          class="topbar__icon-btn"
          matTooltip="Appointment Calendar"
        >
          <i class="ri-calendar-2-line"></i>
        </a>
      </li>

      <!-- Notifications -->
      <li>
        <button
          class="topbar__icon-btn topbar__icon-btn--badge"
          [matMenuTriggerFor]="notifMenu"
          aria-label="Notifications"
        >
          <i class="ri-notification-3-line"></i>
          <span class="topbar__badge">{{ notifications.length }}</span>
        </button>

        <mat-menu class="ck-dropdown" #notifMenu="matMenu" xPosition="before">
          <div class="ck-dropdown__wrapper" [class.ck-dropdown--dark]="isDark()">
            <div class="ck-dropdown__header">
              <span class="ck-dropdown__title">Notifications</span>
              <a routerLink="/notifications" class="ck-dropdown__action">View all</a>
            </div>
            <ul class="ck-dropdown__list">
              @for (n of notifications; track n.text) {
                <li class="ck-notif">
                  <span class="ck-notif__icon" [style.color]="n.color">
                    <i [class]="n.icon"></i>
                  </span>
                  <div class="ck-notif__body">
                    <p class="ck-notif__text">{{ n.text }}</p>
                    <span class="ck-notif__time">{{ n.time }}</span>
                  </div>
                </li>
              }
            </ul>
          </div>
        </mat-menu>
      </li>

      <!-- Profile -->
      <li>
        <button
          class="topbar__profile-btn"
          [matMenuTriggerFor]="profileMenu"
          aria-label="User menu"
        >
          <span class="topbar__avatar">N</span>
          <span class="topbar__username">Nabil</span>
          <i class="ri-arrow-down-s-line"></i>
        </button>

        <mat-menu class="ck-dropdown" #profileMenu="matMenu" xPosition="before">
          <div class="ck-dropdown__wrapper" [class.ck-dropdown--dark]="isDark()">
            <div class="ck-dropdown__profile">
              <span class="topbar__avatar topbar__avatar--lg">N</span>
              <div>
                <p class="ck-dropdown__profile-name">Nabil Helmy</p>
                <p class="ck-dropdown__profile-email">nabilhelmy313&#64;gmail.com</p>
              </div>
            </div>
            <ul class="ck-dropdown__list ck-dropdown__list--nav">
              <li><a routerLink="/settings/clinic" mat-menu-item><i class="ri-settings-4-line"></i> Clinic Settings</a></li>
              <li><a routerLink="/settings/users" mat-menu-item><i class="ri-user-settings-line"></i> User Management</a></li>
              <li class="ck-dropdown__divider"></li>
              <li><a routerLink="/auth/logout" mat-menu-item class="ck-dropdown__logout"><i class="ri-logout-box-r-line"></i> Sign Out</a></li>
            </ul>
          </div>
        </mat-menu>
      </li>

    </ul>
  </div>
</header>
