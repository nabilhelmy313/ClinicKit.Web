<header class="topbar"
    [class.topbar--sticky]="isSticky"
    [class.topbar--collapsed]="isSidebarToggled"
    [class.topbar--dark]="themeService.isDark()"
    [class.topbar--rtl]="langService.isRTL()">

    <!-- ── Start: burger (tablet) ── -->
    <div class="topbar__start">
        <button class="topbar-burger"
                type="button"
                [class.topbar-burger--open]="isSidebarToggled"
                (click)="toggle()"
                [attr.aria-label]="'TOPBAR.TOGGLE_SIDEBAR' | translate">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- ── Center: logo ── -->
    <div class="topbar__brand">
        <img src="assets/logo.svg" alt="طَبَّبَ" class="topbar__logo">
    </div>

    <!-- ── End: action buttons ── -->
    <div class="topbar__end">

        <!-- Language toggle -->
        <button class="topbar-btn topbar-btn--lang"
                type="button"
                (click)="toggleLang()"
                [matTooltip]="langSwitchTooltip() | translate"
                matTooltipPosition="below">
            <i class="material-symbols-outlined">translate</i>
            <span class="topbar-btn__lang-label">{{ langSwitchLabel() }}</span>
        </button>

        <!-- Dark / Light mode -->
        <button class="topbar-btn"
                type="button"
                (click)="toggleTheme()"
                [matTooltip]="(themeService.isDark() ? 'TOPBAR.LIGHT_MODE' : 'TOPBAR.DARK_MODE') | translate"
                matTooltipPosition="below">
            <i class="material-symbols-outlined">
                {{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}
            </i>
        </button>

        <!-- Notifications -->
        <button class="topbar-btn"
                type="button"
                [matMenuTriggerFor]="notifMenu"
                [matTooltip]="'TOPBAR.NOTIFICATIONS' | translate"
                matTooltipPosition="below">
            <i class="material-symbols-outlined">notifications</i>
        </button>

        <mat-menu #notifMenu="matMenu" xPosition="before" class="topbar-dropdown">
            <div class="td-header">
                <span>{{ 'TOPBAR.NOTIFICATIONS' | translate }}</span>
            </div>
            <div class="td-empty">
                <i class="material-symbols-outlined">notifications_none</i>
                <span>{{ 'TOPBAR.NO_NOTIFICATIONS' | translate }}</span>
            </div>
        </mat-menu>

        <!-- Profile -->
        <button class="topbar-btn topbar-btn--profile"
                type="button"
                [matMenuTriggerFor]="profileMenu">
            <i class="material-symbols-outlined topbar-avatar">account_circle</i>
            <div class="topbar-user-info">
                <span class="topbar-user-info__name">{{ displayName() }}</span>
                <span class="topbar-user-info__role">{{ roleLabel() | translate }}</span>
            </div>
            <i class="material-symbols-outlined topbar-btn__chevron">expand_more</i>
            <span class="topbar-btn__online"></span>
        </button>

        <mat-menu #profileMenu="matMenu" xPosition="before" class="topbar-dropdown topbar-dropdown--profile">
            <div class="td-profile-header">
                <i class="material-symbols-outlined td-avatar">account_circle</i>
                <div class="td-profile-info">
                    <span class="td-profile-name">{{ displayName() }}</span>
                    <span class="td-profile-email">{{ authService.currentUser()?.email }}</span>
                    <span class="td-profile-role">{{ roleLabel() | translate }}</span>
                </div>
            </div>

            <div class="td-divider"></div>

            <button mat-menu-item routerLink="/settings">
                <i class="material-symbols-outlined">settings</i>
                {{ 'SETTINGS.TITLE' | translate }}
            </button>
            <button mat-menu-item (click)="logout()">
                <i class="material-symbols-outlined">logout</i>
                {{ 'AUTH.LOGOUT' | translate }}
            </button>
        </mat-menu>

    </div>
</header>
