<div [dir]="langService.isRTL() ? 'rtl' : 'ltr'"
     [class.component-dark-theme]="themeService.isDark()">

    <ck-page-header
        icon="patient_list"
        [title]="'PATIENTS.TITLE' | translate"
        [breadcrumbs]="[
            { label: ('SIDEBAR.DASHBOARD' | translate), link: '/dashboard' },
            { label: ('PATIENTS.TITLE' | translate) }
        ]">
        <ck-btn icon="person_add" (clicked)="router.navigate(['/patients/new'])">
            {{ 'PATIENTS.ADD_PATIENT' | translate }}
        </ck-btn>
    </ck-page-header>

    <ck-card [noPadding]="true">
        <ck-table
            [serverSide]="true"
            [columnDefs]="colDefs"
            [data]="patients()"
            [loading]="loading()"
            [totalCount]="totalCount()"
            [page]="page()"
            [pageSize]="pageSize()"
            [actions]="tableActions"
            emptyIcon="person_search"
            [emptyMessage]="'PATIENTS.NO_PATIENTS' | translate"
            [emptyActionLabel]="'PATIENTS.ADD_PATIENT' | translate"
            emptyActionIcon="person_add"
            [clickable]="true"
            (filterChange)="onFilterChange($event)"
            (sortChange)="onSortChange($event)"
            (prevPage)="prevPage()"
            (nextPage)="nextPage()"
            (pageSizeChange)="onPageSizeChange($event)"
            (reload)="load()"
            (emptyAction)="router.navigate(['/patients/new'])"
            (rowClick)="router.navigate(['/patients', $event.id])">

            <ng-template ckCell="name" let-p>
                <a [routerLink]="['/patients', p.id]" class="ck-table-link">{{ p.fullName }}</a>
            </ng-template>

            <ng-template ckCell="phone" let-p>
                <span dir="ltr">{{ p.phone }}</span>
            </ng-template>

            <ng-template ckCell="gender" let-p>
                {{ genderLabel(p.gender) }}
            </ng-template>

            <ng-template ckCell="dob" let-p>
                {{ p.dateOfBirth ? (p.dateOfBirth | date:'dd/MM/yyyy') : '—' }}
            </ng-template>

        </ck-table>
    </ck-card>

</div>
