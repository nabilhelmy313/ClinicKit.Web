<div class="ck-dialog">

  <!-- Header -->
  <div class="ck-dialog__header" [class.ck-dialog__header--danger]="data.danger">
    <div class="ck-dialog__icon-wrap">
      <span class="material-icons">{{ data.danger ? 'warning' : 'help_outline' }}</span>
    </div>
    <h2 class="ck-dialog__title">{{ data.title }}</h2>
  </div>

  <!-- Body -->
  <div class="ck-dialog__body">
    <p class="ck-dialog__warning">{{ data.message }}</p>
  </div>

  <!-- Actions -->
  <div class="ck-dialog__actions">
    <button mat-stroked-button class="ck-confirm-cancel" (click)="cancel()">
      {{ data.cancelLabel ?? 'Cancel' }}
    </button>
    <button mat-flat-button
      [class.ck-confirm-primary]="!data.danger"
      [class.ck-confirm-danger]="data.danger"
      (click)="confirm()">
      {{ data.confirmLabel ?? 'Confirm' }}
    </button>
  </div>

</div>
