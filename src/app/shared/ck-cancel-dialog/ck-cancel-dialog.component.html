<div class="ck-dialog" [dir]="langService.isRTL() ? 'rtl' : 'ltr'">

  <!-- Header -->
  <div class="ck-dialog__header ck-dialog__header--danger">
    <div class="ck-dialog__icon-wrap">
      <span class="material-symbols-outlined">event_busy</span>
    </div>
    <h2 class="ck-dialog__title">{{ 'APPOINTMENTS.CANCEL_TITLE' | translate }}</h2>
    <p class="ck-dialog__subtitle">{{ data.patientName }}</p>
  </div>

  <!-- Body -->
  <div class="ck-dialog__body">
    <p class="ck-dialog__warning">
      {{ 'APPOINTMENTS.CANCEL_WARNING' | translate }}
    </p>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>{{ 'APPOINTMENTS.CANCEL_REASON' | translate }}</mat-label>
      <textarea matInput
                [formControl]="reasonCtrl"
                rows="3"
                [placeholder]="'APPOINTMENTS.CANCEL_REASON_PLACEHOLDER' | translate">
      </textarea>
    </mat-form-field>
  </div>

  <!-- Actions -->
  <div class="ck-dialog__actions">
    <ck-btn variant="outline" (click)="dismiss()">
      {{ 'COMMON.BACK' | translate }}
    </ck-btn>
    <ck-btn variant="danger" icon="event_busy" (click)="confirm()">
      {{ 'APPOINTMENTS.CANCEL_CONFIRM' | translate }}
    </ck-btn>
  </div>

</div>
